<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 220px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #1a1a1a;
      color: #eaeaea;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
    }
    .label {
      font-size: 15px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    /* Minimal iOS-style Premium Switch */
    .switch {
      position: relative;
      display: inline-block;
      width: 46px;
      height: 26px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #3f3f3f;
      transition: .3s cubic-bezier(0.4, 0.0, 0.2, 1);
      border-radius: 26px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 20px;
      width: 20px;
      left: 3px;
      bottom: 3px;
      background-color: #ffffff;
      transition: .3s cubic-bezier(0.4, 0.0, 0.2, 1);
      border-radius: 50%;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
    }
    input:checked + .slider {
      background-color: #FF0000; /* YouTube Red */
    }
    input:checked + .slider:before {
      transform: translateX(20px);
    }
    input:focus + .slider {
      box-shadow: 0 0 1px #FF0000;
    }
  </style>
</head>
<body>
  <div class="label">Auto-Redirect</div>
  <label class="switch">
    <input type="checkbox" id="toggleSwitch">
    <span class="slider"></span>
  </label>

  <script src="popup.js"></script>
</body>
</html>
